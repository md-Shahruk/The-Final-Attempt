<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <header>
        <h1 id="greetings"> Good Morning!</h1>
    </header>

    <main>
        <div class="card">
            <h2>Habit Tracker</h2>
            <h3 id="show-count">0</h3>
            <button id="inc">Increment</button>
            <button id="dec">Decrement</button>
            <button id="reset">Reset</button>
        </div>

        <div class="card">
            <h2>Bill Calculator</h2>
            <label for="totalbill">Total Bill</label>
            <input type="number" id="totalbill" placeholder="Enter total bill" min="0" required>
            <label for="totalPerson">Person</label>
            <input type="number" id="totalPerson" placeholder="How many person" min="0" required>
            <button id="billCalculate">Calculate</button>
            <h3 id="billresult">0</h3>
        </div>
    </main>

    <script type="module" src="dist/dashboard.js"></script>
</body>
</html>
